<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

     <!-- Primary SEO -->
    <title>SafeHaven — Anonymous Abuse Reporting Platform</title>
    <meta name="description" content="SafeHaven is a secure and anonymous platform for reporting abuse. Your identity is protected. Submit a report, track its status, and access support resources." />
    <meta name="keywords" content="abuse reporting, anonymous report, safe reporting, domestic abuse, SafeHaven" />
    <meta name="robots" content="index, follow" />

     <!-- Open Graph (social sharing) -->
    <meta property="og:title" content="SafeHaven — Anonymous Abuse Reporting" />
    <meta property="og:description" content="A secure and anonymous platform for reporting abuse. Your identity is always protected." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://safehaven-beta.vercel.app" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#4F46E5" />

   <!-- Inter font — loaded asynchronously to avoid render blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      />
    </noscript>

    <title>SafeHaven — Anonymous Abuse Reporting Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
